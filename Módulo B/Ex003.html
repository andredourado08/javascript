<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Programa</title>
    <style>
        body{
            background-color: rgba(0, 0, 255, 0.425);
            color: rgb(255, 255, 255);
            font: normal 20px Arial, Helvetica, sans-serif;
        }
        h1{
            color: rgb(240, 240, 112);
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Este é o meu primeiro programa em HTML</p>
    <script>
        var n1 = Number(window.prompt('Digite um número:'));
        var n2 = Number(window.prompt('Digite outro número:'));
        var resultado = n1 + n2;
        window.alert(`A soma do resultado de ${n1} e ${n2} é ${resultado}`);
    </script>
</body>
</html>

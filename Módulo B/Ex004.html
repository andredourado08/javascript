<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Programa</title>
    <style>
        body{font: normal 20px Arial, Helvetica, sans-serif;}
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual é seu nome ?');
        document.write(`Ola, <strong>${nome}</strong>! Seu nome tem ${nome.length} letras <br>`); 
        document.write(`Seu nome em maiusculo é ${nome.toUpperCase()}`);
        document.write(` e em minusculo é ${nome.toLowerCase()}`);
    </script>
</body>
</html>

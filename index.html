<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>📘 Biblioteca da Princesa Gabriela</title>
  <!-- Font Awesome, Google Fonts e PDF.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Quicksand', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f0f5ff 0%, #e6edfb 100%);
      min-height: 100vh;
      padding: 20px 16px 30px;
      color: #0a1e3c;
    }

    :root {
      --royal: #2a5ac9;
      --royal-light: #5f8aee;
      --royal-soft: #b2c9ff;
      --royal-dark: #1a3f8f;
      --bg-card: #ffffffea;
      --shadow: 0 12px 28px rgba(26, 63, 143, 0.12), 0 4px 12px rgba(0, 20, 60, 0.05);
    }

    .container { max-width: 1280px; margin: 0 auto; }

    .royal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 28px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      padding: 16px 24px;
      border-radius: 48px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(65, 105, 225, 0.25);
    }
    .header-title { display: flex; align-items: center; gap: 10px; }
    .header-title i { font-size: 2.2rem; color: var(--royal); }
    .header-title h1 { font-weight: 700; font-size: 1.8rem; color: #0b2552; }
    .crown-badge {
      background: var(--royal); color: white; padding: 8px 20px;
      border-radius: 40px; font-weight: 600;
    }

    .catalog-filter-section { margin: 20px 0 10px; }
    .filter-title { font-weight: 600; margin-bottom: 10px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px 10px; }
    .filter-chip {
      background: #ecf2ff; border: 1.5px solid #b6ceff;
      color: #1a3f8f; padding: 8px 16px; border-radius: 40px;
      font-weight: 600; cursor: pointer;
    }
    .filter-chip.active {
      background: var(--royal); color: white; border-color: var(--royal);
    }

    .add-section { margin-bottom: 40px; }
    .add-button {
      background: var(--royal); color: white; padding: 16px 28px;
      border-radius: 60px; font-size: 1.3rem; font-weight: 600;
      border: none; cursor: pointer; box-shadow: 0 10px 18px -4px #1a3f8f80;
      display: inline-flex; align-items: center; gap: 12px;
    }

    .book-form-panel {
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px);
      border-radius: 36px; padding: 28px; margin: 20px 0 30px;
      box-shadow: var(--shadow); border: 1px solid #a7c0fd;
      display: none;
    }
    .book-form-panel.show { display: block; }
    .form-grid { display: grid; gap: 24px; }
    @media (min-width: 640px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    .full-width { grid-column: 1 / -1; }

    label {
      font-weight: 600; color: #102a54; display: block; margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%; padding: 16px 20px; background: white;
      border: 2px solid #d3e0ff; border-radius: 40px;
      font-size: 1rem; outline: none;
    }
    input[type="text"]:focus { border-color: var(--royal); }

    .file-input-wrapper { position: relative; display: flex; align-items: center; }
    .file-input-wrapper input[type="file"] {
      position: absolute; opacity: 0; width: 0.1px; height: 0.1px;
    }
    .file-label {
      background: #ecf2ff; border: 2px dashed var(--royal-light);
      border-radius: 40px; padding: 16px 24px; width: 100%;
      text-align: center; color: var(--royal-dark); font-weight: 600;
      cursor: pointer;
    }

    .cat-checkbox-group {
      max-height: 200px; overflow-y: auto; display: flex; flex-wrap: wrap;
      gap: 10px; background: #f9fcff; padding: 16px; border-radius: 28px;
      border: 1px solid #d3e0ff;
    }
    .cat-checkbox-group label {
      background: #e9f0ff; padding: 8px 18px; border-radius: 30px;
      font-weight: 500; display: inline-flex; align-items: center;
      gap: 6px;
    }

    .btn {
      padding: 16px 32px; border-radius: 60px; font-weight: 700; font-size: 1.2rem;
      border: none; cursor: pointer; display: inline-flex; align-items: center;
      gap: 10px;
    }
    .btn-primary { background: var(--royal); color: white; }
    .btn-secondary { background: #eef3ff; color: #1a3f8f; border: 2px solid #b6ceff; }

    .books-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 24px; margin-top: 20px;
    }
    .book-card { background: var(--bg-card); border-radius: 28px; padding: 18px; box-shadow: var(--shadow); }
    .book-cover { aspect-ratio: 3/4; background: #d9e6ff; border-radius: 18px; overflow: hidden; border: 2px solid white; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .default-cover { background: linear-gradient(145deg, #2a5ac9, #1e3f8a); color: white; font-size: 2.8rem; display: flex; align-items: center; justify-content: center; height: 100%; }
    .book-title { font-weight: 700; font-size: 1.2rem; margin: 12px 0 6px; }
    .cat-tag { background: var(--royal-soft); padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; }
    .progress-indicator { font-size: 0.9rem; color: var(--royal-dark); margin: 8px 0; }
    .card-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: #ecf2ff; border: none; border-radius: 40px; padding: 10px 12px;
      font-weight: 600; color: #102a54; cursor: pointer; flex: 1; border: 1px solid #cddefc;
    }

    /* Leitor overlay */
    .reader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a1424; z-index: 1000; display: none; flex-direction: column;
    }
    .reader-toolbar {
      display: flex; align-items: center; padding: 12px 16px; background: #102a44;
      color: white; gap: 12px; flex-wrap: wrap;
    }
    .reader-toolbar button {
      background: #2e4e7a; border: none; color: white; padding: 10px 16px;
      border-radius: 30px; font-weight: 600; cursor: pointer;
    }

    #pdfViewerContainer {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      background: #525659;
      padding: 12px;
      touch-action: pan-y;
      position: relative;
    }

    .pdf-page-wrapper {
      position: relative;
      display: inline-block;
      margin: 0 auto;
      box-shadow: 0 4px 12px black;
      background: white;
    }

    #pdfCanvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: white;
      touch-action: pan-y pinch-zoom;
      position: relative;
      z-index: 1;
    }

    .textLayer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      opacity: 0.25;
      line-height: 1.0;
      user-select: text;
      cursor: text;
      color: transparent;
      z-index: 2;
    }

    .textLayer > span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }

    /* Barra de ferramentas estilo Kindle (fixa no rodapé) */
    .kindle-toolbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2b3c;
      border-radius: 60px;
      padding: 12px 20px;
      display: none;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 1150;
      border: 1px solid #4a6a8a;
      backdrop-filter: blur(4px);
    }

    .kindle-toolbar .color-option {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.8);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .kindle-toolbar .color-option:hover { transform: scale(1.1); }

    .kindle-toolbar .action-btn {
      background: #3a5a7a;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      border: 1px solid #7a9bcb;
    }

    .kindle-toolbar .delete-btn {
      background: #7a3a3a;
      border-color: #cb7a7a;
    }

    .kindle-toolbar .close-toolbar {
      background: none;
      border: none;
      color: #ccddee;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0 8px;
    }

    /* Painel lateral de reflexões */
    .reflections-panel {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 300px;
      max-height: 70vh;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      z-index: 1050;
      display: none;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #a7c0fd;
    }
    .reflections-header {
      padding: 16px;
      background: var(--royal);
      color: white;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .reflections-list {
      overflow-y: auto;
      padding: 12px;
      max-height: calc(70vh - 60px);
    }
    .reflection-item {
      background: #f4f9ff;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 6px solid #2a5ac9;
      position: relative;
    }
    .reflection-text {
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .reflection-note {
      background: white;
      padding: 8px;
      border-radius: 12px;
      font-style: italic;
      font-size: 0.85rem;
    }
    .delete-reflection {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: #c44569;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .hover-note-tooltip {
      position: absolute;
      background: #1e3a6b;
      color: white;
      padding: 10px 16px;
      border-radius: 20px;
      max-width: 250px;
      font-size: 0.9rem;
      box-shadow: 0 4px 10px black;
      z-index: 1200;
      pointer-events: none;
      display: none;
    }

    .simple-footer {
      margin-top: 14px;
      padding: 5px 6px;
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 30px 30px 18px 18px;
      border-top: 2px solid #2a5ac9;
      color: #0b2552;
    }
  </style>
</head>
<body>
<div class="container" id="mainContainer">
  <header class="royal-header">
    <div class="header-title">
      <i class="fas fa-crown" style="color: #f9c74f;"></i>
      <h1>Biblioteca da <span>Princesa</span> 👸</h1>
    </div>
    <div class="crown-badge"><i class="fas fa-heart"></i> Gabriela</div>
  </header>

  <div class="add-section">
    <button class="add-button" id="showFormBtn"><i class="fas fa-plus-circle"></i> Adicionar novo livro</button>
  </div>

  <!-- Formulário -->
  <div class="book-form-panel" id="formPanel">
    <form id="bookForm">
      <div class="form-grid">
        <div class="form-group">
          <label><i class="fas fa-heading"></i> Título *</label>
          <input type="text" id="bookTitle" placeholder="Ex: O Pequeno Príncipe" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-image"></i> Capa (opcional)</label>
          <div class="file-input-wrapper">
            <input type="file" id="coverImage" accept="image/*">
            <label for="coverImage" class="file-label"><i class="fas fa-cloud-upload-alt"></i> Escolher imagem</label>
          </div>
        </div>
        <div class="full-width form-group">
          <label><i class="fas fa-tags"></i> Categorias</label>
          <div class="cat-checkbox-group" id="categoryCheckboxes"></div>
        </div>
        <div class="full-width form-group">
          <label><i class="fas fa-file-pdf"></i> Arquivo PDF *</label>
          <div class="file-input-wrapper">
            <input type="file" id="pdfFile" accept=".pdf" required>
            <label for="pdfFile" class="file-label"><i class="fas fa-file-pdf"></i> Selecionar PDF</label>
          </div>
        </div>
        <div class="form-actions full-width">
          <button type="button" class="btn btn-secondary" id="cancelFormBtn"><i class="fas fa-times"></i> Cancelar</button>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar na estante</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Filtro por categorias -->
  <div class="catalog-filter-section">
    <div class="filter-title"><i class="fas fa-filter"></i> Filtrar por catálogo:</div>
    <div class="filter-chips" id="categoryFilters">
      <button class="filter-chip active" data-category="all">📚 Todas</button>
    </div>
  </div>

  <h2 style="margin: 30px 0 15px;"><i class="fas fa-bookmark"></i> Minha coleção</h2>
  <div id="booksContainer" class="books-grid"></div>
  <div id="emptyState" style="text-align:center; padding:50px; background:#ffffffb0; border-radius:48px;">✨ Nenhum livro ainda...</div>
</div>

<!-- Leitor -->
<div class="reader-overlay" id="readerOverlay">
  <div class="reader-toolbar">
    <button id="closeReaderBtn"><i class="fas fa-arrow-left"></i> Voltar</button>
    <span id="readerBookTitle">Livro</span>
    <span class="page-info"><span id="currentPage">1</span>/<span id="totalPages">0</span></span>
    <button id="prevPageBtn"><i class="fas fa-chevron-left"></i></button>
    <button id="nextPageBtn"><i class="fas fa-chevron-right"></i></button>
    <button id="toggleHighlightsBtn" title="Mostrar/ocultar cores"><i class="fas fa-highlighter"></i> Cores</button>
    <button id="toggleReflectionsPanelBtn" title="Ver todas as reflexões"><i class="fas fa-list-ul"></i> Reflexões</button>
    <button id="helpMarkerBtn" style="margin-left: auto;"><i class="fas fa-question-circle"></i> Como marcar?</button>
  </div>
  <div id="pdfViewerContainer">
    <div class="pdf-page-wrapper" id="pdfPageWrapper">
      <canvas id="pdfCanvas"></canvas>
      <div class="textLayer" id="textLayer"></div>
    </div>
    <!-- Painel lateral de reflexões -->
    <div class="reflections-panel" id="reflectionsPanel">
      <div class="reflections-header">
        <span><i class="fas fa-pen-fancy"></i> Minhas Reflexões</span>
        <button id="closeReflectionsPanel" style="background:none;border:none;color:white;cursor:pointer;font-size:1.2rem;">&times;</button>
      </div>
      <div class="reflections-list" id="reflectionsList"></div>
    </div>
  </div>
  
  <!-- Barra estilo Kindle (fixa) -->
  <div class="kindle-toolbar" id="kindleToolbar">
    <span class="color-option" style="background:#F9E75C;" data-color="#F9E75C"></span>
    <span class="color-option" style="background:#FF9A9E;" data-color="#FF9A9E"></span>
    <span class="color-option" style="background:#A7F3D0;" data-color="#A7F3D0"></span>
    <span class="color-option" style="background:#BFDBFE;" data-color="#BFDBFE"></span>
    <button class="action-btn delete-btn" id="kindleDeleteBtn"><i class="fas fa-trash-alt"></i> Apagar</button>
    <button class="action-btn" id="kindleNoteBtn"><i class="fas fa-pen"></i> Nota</button>
    <button class="close-toolbar" id="closeKindleToolbar"><i class="fas fa-times"></i></button>
  </div>

  <div class="hover-note-tooltip" id="hoverNoteTooltip"></div>
</div>

<footer class="simple-footer">
  <div class="footer-verse"><i class="fas fa-book-bible"></i> Josué 24:15 — “Eu e a minha casa serviremos ao Senhor.”</div>
  <div class="footer-love">Eu e você SEMPRE serviremos ao Senhor, meu amor ❤️</div>
  <div class="footer-motto"><i class="fas fa-heart" style="color: #c44569;"></i> CORAGEMMMMM! <i class="fas fa-heart" style="color: #c44569;"></i></div>
</footer>

<script>
  (() => {
    // ---------- Feedback upload ----------
    const coverInput = document.getElementById('coverImage');
    const pdfInput = document.getElementById('pdfFile');
    const coverLabel = document.querySelector('label[for="coverImage"]');
    const pdfLabel = document.querySelector('label[for="pdfFile"]');

    function updateFileLabel(input, label, defaultText) {
      if (input.files.length > 0) {
        const fileName = input.files[0].name;
        label.innerHTML = `<i class="fas fa-check-circle" style="color: #2a5ac9;"></i> ${fileName}`;
        label.style.background = '#e0f0ff';
        label.style.border = '2px solid #2a5ac9';
      } else {
        label.innerHTML = defaultText;
        label.style.background = '#ecf2ff';
        label.style.border = '2px dashed var(--royal-light)';
      }
    }
    coverInput.addEventListener('change', () => updateFileLabel(coverInput, coverLabel, '<i class="fas fa-cloud-upload-alt"></i> Escolher imagem'));
    pdfInput.addEventListener('change', () => updateFileLabel(pdfInput, pdfLabel, '<i class="fas fa-file-pdf"></i> Selecionar PDF'));

    // ---------- CONFIGURAÇÕES ----------
    const CATEGORIES = ["Romance","Fantasia","Romantasia","Ficção","Suspense","Terror", "Aventura"];
    let currentFilter = 'all';

    // DB
    const DB_NAME = 'PrincessLibraryV10';
    const STORE_BOOKS = 'books';
    const STORE_HIGHLIGHTS = 'highlights';
    let db;

    async function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 10);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => { db = req.result; resolve(db); };
        req.onupgradeneeded = (e) => {
          const dbRef = e.target.result;
          if (!dbRef.objectStoreNames.contains(STORE_BOOKS)) {
            const store = dbRef.createObjectStore(STORE_BOOKS, { keyPath: 'id', autoIncrement: true });
            store.createIndex('by_title', 'title');
          }
          if (!dbRef.objectStoreNames.contains(STORE_HIGHLIGHTS)) {
            const hs = dbRef.createObjectStore(STORE_HIGHLIGHTS, { keyPath: 'id', autoIncrement: true });
            hs.createIndex('bookId', 'bookId');
          }
        };
      });
    }
    async function getDB() { if (!db) await openDB(); return db; }

    async function saveBook(book) {
      const database = await getDB();
      return new Promise((res, rej) => {
        const tx = database.transaction(STORE_BOOKS, 'readwrite');
        const req = tx.objectStore(STORE_BOOKS).add(book);
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }
    async function updateBook(id, updates) {
      const database = await getDB();
      const tx = database.transaction(STORE_BOOKS, 'readwrite');
      const store = tx.objectStore(STORE_BOOKS);
      const getReq = store.get(id);
      return new Promise((res, rej) => {
        getReq.onsuccess = () => {
          const book = getReq.result;
          if (!book) return rej('not found');
          Object.assign(book, updates);
          store.put(book).onsuccess = () => res();
        };
      });
    }
    async function getAllBooks() {
      const database = await getDB();
      return new Promise((res) => {
        const tx = database.transaction(STORE_BOOKS, 'readonly');
        tx.objectStore(STORE_BOOKS).getAll().onsuccess = (e) => res(e.target.result || []);
      });
    }
    async function getBook(id) {
      const database = await getDB();
      return new Promise((res) => {
        database.transaction(STORE_BOOKS).objectStore(STORE_BOOKS).get(id).onsuccess = (e) => res(e.target.result);
      });
    }
    async function deleteBook(id) {
      const database = await getDB();
      const tx = database.transaction([STORE_BOOKS, STORE_HIGHLIGHTS], 'readwrite');
      tx.objectStore(STORE_BOOKS).delete(id);
      const idx = tx.objectStore(STORE_HIGHLIGHTS).index('bookId');
      idx.openCursor(IDBKeyRange.only(id)).onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) { cursor.delete(); cursor.continue(); }
      };
      return new Promise(res => { tx.oncomplete = res; });
    }

    async function saveHighlight(hl) {
      const database = await getDB();
      const tx = database.transaction(STORE_HIGHLIGHTS, 'readwrite');
      const req = tx.objectStore(STORE_HIGHLIGHTS).add(hl);
      return new Promise((res, rej) => {
        req.onsuccess = () => res(req.result);
        req.onerror = rej;
      });
    }
    async function getHighlights(bookId) {
      const database = await getDB();
      return new Promise((res) => {
        const tx = database.transaction(STORE_HIGHLIGHTS);
        tx.objectStore(STORE_HIGHLIGHTS).index('bookId').getAll(bookId).onsuccess = (e) => res(e.target.result || []);
      });
    }
    async function deleteHighlight(id) {
      const database = await getDB();
      const tx = database.transaction(STORE_HIGHLIGHTS, 'readwrite');
      tx.objectStore(STORE_HIGHLIGHTS).delete(id);
      return new Promise(res => { tx.oncomplete = res; });
    }

    // UI inicial
    const catDiv = document.getElementById('categoryCheckboxes');
    CATEGORIES.forEach(cat => {
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" value="${cat}"> ${cat}`;
      catDiv.appendChild(label);
    });

    const formPanel = document.getElementById('formPanel');
    document.getElementById('showFormBtn').onclick = () => formPanel.classList.add('show');
    document.getElementById('cancelFormBtn').onclick = () => { formPanel.classList.remove('show'); bookForm.reset(); };

    const bookForm = document.getElementById('bookForm');
    function resetFormCompleto() {
      bookForm.reset();
      document.querySelectorAll('#categoryCheckboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateFileLabel(coverInput, coverLabel, '<i class="fas fa-cloud-upload-alt"></i> Escolher imagem');
      updateFileLabel(pdfInput, pdfLabel, '<i class="fas fa-file-pdf"></i> Selecionar PDF');
    }

    bookForm.onsubmit = async (e) => {
      e.preventDefault();
      const title = document.getElementById('bookTitle').value.trim();
      const pdfFile = document.getElementById('pdfFile').files[0];
      if (!title || !pdfFile) return alert('Título e PDF obrigatórios');
      const coverFile = document.getElementById('coverImage').files[0];
      let coverDataURL = null;
      if (coverFile) coverDataURL = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(coverFile); });
      const selectedCats = Array.from(document.querySelectorAll('#categoryCheckboxes input:checked')).map(cb => cb.value);
      const pdfBlob = new Blob([await pdfFile.arrayBuffer()], {type: 'application/pdf'});
      await saveBook({ title, coverDataURL, categories: selectedCats, pdfBlob, currentPage: 1 });
      formPanel.classList.remove('show');
      resetFormCompleto();
      renderBooks();
    };

    async function renderBooks() {
      const books = await getAllBooks();
      const container = document.getElementById('booksContainer');
      const empty = document.getElementById('emptyState');
      let filteredBooks = currentFilter === 'all' ? books : books.filter(b => b.categories && b.categories.includes(currentFilter));
      empty.style.display = filteredBooks.length ? 'none' : 'block';
      let html = '';
      filteredBooks.sort((a,b) => (b.id||0) - (a.id||0));
      for (let b of filteredBooks) {
        const cover = b.coverDataURL ? `<img src="${b.coverDataURL}">` : `<div class="default-cover"><i class="fas fa-book"></i></div>`;
        const cats = (b.categories||[]).slice(0,3).map(c=>`<span class="cat-tag">${c}</span>`).join('');
        html += `<div class="book-card" data-id="${b.id}">
          <div class="book-cover">${cover}</div>
          <div class="book-title">${escape(b.title)}</div>
          <div class="book-cats">${cats}</div>
          <div class="progress-indicator"><i class="fas fa-book-open"></i> Página ${b.currentPage||1}</div>
          <div class="card-actions">
            <button class="icon-btn read-btn" data-id="${b.id}"><i class="fas fa-book-reader"></i> Ler</button>
            <button class="icon-btn download-btn" data-id="${b.id}"><i class="fas fa-download"></i></button>
            <button class="icon-btn delete-btn" data-id="${b.id}"><i class="fas fa-trash"></i></button>
          </div>
        </div>`;
      }
      container.innerHTML = html;
      document.querySelectorAll('.read-btn').forEach(b => b.addEventListener('click', ()=> openReader(Number(b.dataset.id))));
      document.querySelectorAll('.download-btn').forEach(b => b.addEventListener('click', ()=> downloadBook(Number(b.dataset.id))));
      document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', ()=> { if(confirm('Excluir?')) deleteBook(Number(b.dataset.id)).then(renderBooks); }));
    }
    function escape(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    async function downloadBook(id) {
      const book = await getBook(id);
      if (!book?.pdfBlob) return;
      const url = URL.createObjectURL(book.pdfBlob);
      const a = document.createElement('a'); a.href = url; a.download = `${book.title}.pdf`; a.click();
    }

    // ---------- LEITOR PDF ----------
    let pdfDoc = null, currentBookId = null, currentPageNum = 1, totalPages = 0;
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const textLayerDiv = document.getElementById('textLayer');
    const wrapper = document.getElementById('pdfPageWrapper');
    const overlay = document.getElementById('readerOverlay');
    const kindleToolbar = document.getElementById('kindleToolbar');
    const hoverNoteTooltip = document.getElementById('hoverNoteTooltip');
    const reflectionsPanel = document.getElementById('reflectionsPanel');
    const reflectionsList = document.getElementById('reflectionsList');
    let selectedText = '';
    let selectionRect = null;
    let showHighlights = true;
    let currentHighlights = [];

    const closeBtn = document.getElementById('closeReaderBtn');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    const toggleHighlightsBtn = document.getElementById('toggleHighlightsBtn');
    const togglePanelBtn = document.getElementById('toggleReflectionsPanelBtn');
    const closePanelBtn = document.getElementById('closeReflectionsPanel');
    const helpBtn = document.getElementById('helpMarkerBtn');
    const closeToolbarBtn = document.getElementById('closeKindleToolbar');

    helpBtn.onclick = () => alert('🖍️ Como usar:\n1. Selecione um trecho.\n2. Use a barra no rodapé para marcar com cor ou adicionar nota.\n3. Para desgrifar, selecione o trecho marcado e clique em "Apagar".');

    togglePanelBtn.onclick = () => {
      if (reflectionsPanel.style.display === 'flex') {
        reflectionsPanel.style.display = 'none';
      } else {
        loadReflectionsList();
        reflectionsPanel.style.display = 'flex';
      }
    };
    closePanelBtn.onclick = () => reflectionsPanel.style.display = 'none';
    closeToolbarBtn.onclick = () => { kindleToolbar.style.display = 'none'; };

    async function loadReflectionsList() {
      if (!currentBookId) return;
      const highlights = await getHighlights(currentBookId);
      // Mostra apenas destaques com nota
      const highlightsWithNotes = highlights.filter(h => h.note && h.note.trim() !== '');
      let html = '';
      highlightsWithNotes.sort((a,b) => a.page - b.page || a.id - b.id);
      for (let h of highlightsWithNotes) {
        const noteDisplay = h.note ? `<div class="reflection-note">📝 ${escape(h.note)}</div>` : '';
        html += `<div class="reflection-item" data-id="${h.id}">
          <button class="delete-reflection" data-id="${h.id}" title="Excluir destaque"><i class="fas fa-trash-alt"></i></button>
          <div class="reflection-text"><span style="background:${h.color}40;padding:2px 4px;">📄 Pág ${h.page}</span> “${escape(h.text.substring(0,60))}${h.text.length>60?'…':''}”</div>
          ${noteDisplay}
        </div>`;
      }
      reflectionsList.innerHTML = html || '<p style="text-align:center;padding:20px;">Nenhuma reflexão ainda.</p>';
      document.querySelectorAll('.delete-reflection').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = Number(btn.dataset.id);
          if (confirm('Excluir este destaque?')) {
            await deleteHighlight(id);
            if (currentBookId) {
              await renderPage(currentPageNum);
              loadReflectionsList();
            }
          }
        });
      });
    }

    async function openReader(bookId) {
      currentBookId = bookId;
      const book = await getBook(bookId);
      if (!book?.pdfBlob) return;
      document.getElementById('readerBookTitle').textContent = book.title;
      overlay.style.display = 'flex';
      reflectionsPanel.style.display = 'none';
      kindleToolbar.style.display = 'none';
      const arrayBuffer = await book.pdfBlob.arrayBuffer();
      pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      totalPages = pdfDoc.numPages;
      document.getElementById('totalPages').textContent = totalPages;
      currentPageNum = book.currentPage || 1;
      await renderPage(currentPageNum);
    }

    async function renderPage(num) {
      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale: 1.2 });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const renderContext = { canvasContext: ctx, viewport };
      await page.render(renderContext).promise;

      const textContent = await page.getTextContent();
      textLayerDiv.innerHTML = '';
      await pdfjsLib.renderTextLayer({ textContent, container: textLayerDiv, viewport, textDivs: [] }).promise;

      wrapper.style.width = viewport.width + 'px';
      wrapper.style.height = viewport.height + 'px';

      document.getElementById('currentPage').textContent = num;
      if (currentBookId) updateBook(currentBookId, { currentPage: num });

      const allHighlights = await getHighlights(currentBookId);
      currentHighlights = allHighlights.filter(h => h.page === num);
      
      if (showHighlights) {
        ctx.save();
        currentHighlights.forEach(h => {
          if (h.rects) {
            ctx.fillStyle = h.color + '80';
            h.rects.forEach(r => ctx.fillRect(r.x, r.y, r.w, r.h));
            ctx.strokeStyle = h.color;
            ctx.lineWidth = 1;
            h.rects.forEach(r => ctx.strokeRect(r.x, r.y, r.w, r.h));
          }
        });
        ctx.restore();
      }

      if (reflectionsPanel.style.display === 'flex') loadReflectionsList();
    }

    prevBtn.onclick = () => { if(currentPageNum>1) { currentPageNum--; renderPage(currentPageNum); } };
    nextBtn.onclick = () => { if(currentPageNum<totalPages) { currentPageNum++; renderPage(currentPageNum); } };
    closeBtn.onclick = () => overlay.style.display = 'none';
    toggleHighlightsBtn.onclick = () => { showHighlights = !showHighlights; renderPage(currentPageNum); };

    let touchStartX = 0;
    canvas.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    canvas.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 60) {
        if (diff < 0 && currentPageNum < totalPages) { currentPageNum++; renderPage(currentPageNum); }
        else if (diff > 0 && currentPageNum > 1) { currentPageNum--; renderPage(currentPageNum); }
      }
    });

    // Exibe a barra estilo Kindle quando houver texto selecionado
    function showKindleToolbar() {
      const selection = window.getSelection();
      selectedText = selection.toString().trim();
      if (!selectedText || selection.rangeCount === 0) {
        kindleToolbar.style.display = 'none';
        return;
      }
      const range = selection.getRangeAt(0);
      const wrapperRect = wrapper.getBoundingClientRect();
      const rect = range.getBoundingClientRect();
      
      if (rect.left < wrapperRect.left || rect.right > wrapperRect.right || rect.top < wrapperRect.top || rect.bottom > wrapperRect.bottom) {
        kindleToolbar.style.display = 'none';
        return;
      }

      const rects = [];
      const clientRects = range.getClientRects();
      for (let i = 0; i < clientRects.length; i++) {
        const r = clientRects[i];
        rects.push({
          x: r.left - wrapperRect.left,
          y: r.top - wrapperRect.top,
          w: r.width,
          h: r.height
        });
      }
      selectionRect = { rects };

      kindleToolbar.style.display = 'flex';
    }

    document.addEventListener('mouseup', (e) => { 
      if (overlay.style.display === 'flex') setTimeout(showKindleToolbar, 10); 
    });
    document.addEventListener('touchend', (e) => { 
      if (overlay.style.display === 'flex') setTimeout(showKindleToolbar, 50); 
    });
    document.addEventListener('click', (e) => {
      if (!wrapper.contains(e.target) && !kindleToolbar.contains(e.target)) {
        kindleToolbar.style.display = 'none';
      }
    });

    // Ações da barra Kindle
    document.querySelectorAll('.kindle-toolbar .color-option').forEach(dot => {
      dot.addEventListener('click', async (e) => {
        e.stopPropagation();
        const color = e.target.dataset.color;
        if (!selectedText) { alert('Selecione um trecho primeiro.'); return; }
        const note = prompt('💬 Adicione uma reflexão (opcional):');
        await saveHighlight({ bookId: currentBookId, page: currentPageNum, text: selectedText, color, note: note || '', rects: selectionRect.rects });
        kindleToolbar.style.display = 'none';
        renderPage(currentPageNum);
      });
    });

    document.getElementById('kindleNoteBtn').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!selectedText) { alert('Selecione um trecho primeiro.'); return; }
      const note = prompt('📝 Escreva sua reflexão:');
      if (note === null) return;
      await saveHighlight({ bookId: currentBookId, page: currentPageNum, text: selectedText, color: '#F9E75C', note, rects: selectionRect.rects });
      kindleToolbar.style.display = 'none';
      renderPage(currentPageNum);
    });

    // Botão "Apagar" - remove destaque sob a seleção
    document.getElementById('kindleDeleteBtn').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!selectedText) { alert('Selecione um trecho para desgrifar.'); return; }
      document.getElementById('kindleDeleteBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (!selectedText) { 
    alert('Selecione um trecho para desgrifar.'); 
    return; 
  }
  
  let foundId = null;
  for (let h of currentHighlights) {
    if (h.rects) {
      for (let r of h.rects) {
        for (let selRect of selectionRect.rects) {
          if (!(r.x + r.w < selRect.x || selRect.x + selRect.w < r.x || r.y + r.h < selRect.y || selRect.y + selRect.h < r.y)) {
            foundId = h.id;
            break;
          }
        }
        if (foundId) break;
      }
    }
    if (foundId) break;
  }
  
  if (foundId) {
    if (confirm('Excluir este destaque?')) {
      await deleteHighlight(foundId);
      kindleToolbar.style.display = 'none';
      renderPage(currentPageNum);
    }
  } else {
    alert('Nenhum destaque encontrado nessa região.');
  }
});
      // Verifica se há algum destaque que intersecta a área selecionada
      const wrapperRect = wrapper.getBoundingClientRect();
      let foundId = null;
      
      for (let h of currentHighlights) {
        if (h.rects) {
          // Verifica se algum retângulo do destaque está dentro da seleção
          for (let r of h.rects) {
            // Pega as coordenadas da seleção (já temos selectionRect)
            for (let selRect of selectionRect.rects) {
              // Verifica interseção simples
              if (!(r.x + r.w < selRect.x || selRect.x + selRect.w < r.x || r.y + r.h < selRect.y || selRect.y + selRect.h < r.y)) {
                foundId = h.id;
                break;
              }
            }
            if (foundId) break;
          }
        }
        if (foundId) break;
      }
      
      if (foundId) {
        if (confirm('Excluir este destaque?')) {
          await deleteHighlight(foundId);
          kindleToolbar.style.display = 'none';
          renderPage(currentPageNum);
        }
      } else {
        alert('Nenhum destaque encontrado nessa região.');
      }
    });

    // Hover para mostrar nota
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      let found = null;
      for (let h of currentHighlights) {
        if (h.rects) {
          for (let r of h.rects) {
            if (mouseX >= r.x && mouseX <= r.x + r.w && mouseY >= r.y && mouseY <= r.y + r.h) {
              found = h;
              break;
            }
          }
        }
        if (found) break;
      }

      if (found && found.note) {
        hoverNoteTooltip.style.display = 'block';
        hoverNoteTooltip.textContent = found.note;
        hoverNoteTooltip.style.left = (e.clientX + 15) + 'px';
        hoverNoteTooltip.style.top = (e.clientY - 30) + 'px';
      } else {
        hoverNoteTooltip.style.display = 'none';
      }
    });

    canvas.addEventListener('mouseleave', () => { hoverNoteTooltip.style.display = 'none'; });

    // Excluir destaque com botão direito (mantido como alternativa)
    canvas.addEventListener('contextmenu', async (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      let foundId = null;
      for (let h of currentHighlights) {
        if (h.rects) {
          for (let r of h.rects) {
            if (mouseX >= r.x && mouseX <= r.x + r.w && mouseY >= r.y && mouseY <= r.y + r.h) {
              foundId = h.id;
              break;
            }
          }
        }
        if (foundId) break;
      }
      if (foundId) {
        if (confirm('Excluir este destaque?')) {
          await deleteHighlight(foundId);
          renderPage(currentPageNum);
        }
      }
    });

    function buildCategoryFilters() {
      const filterContainer = document.getElementById('categoryFilters');
      CATEGORIES.forEach(cat => {
        const chip = document.createElement('button');
        chip.className = 'filter-chip';
        chip.dataset.category = cat;
        chip.textContent = cat;
        chip.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentFilter = cat;
          renderBooks();
        });
        filterContainer.appendChild(chip);
      });
      document.querySelector('[data-category="all"]').addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        document.querySelector('[data-category="all"]').classList.add('active');
        currentFilter = 'all';
        renderBooks();
      });
    }

    openDB().then(() => {
      buildCategoryFilters();
      renderBooks();
    });
  })();
</script>
</body>
</html>
